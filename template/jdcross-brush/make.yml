jdcross-brush-torn:
  metadata:
    height: full
    type: standalone
    interface: 'full+front'
  description: 'torn brush effect mask with game logo'
  package_name: jdcross-brush-torn
  artwork:
    file: artwork.xml
    post_process:
      - strategy: background
        overlay: brush_shadow_black.png

jdcross-brush-emboss:
  metadata:
    height: full
    type: standalone
    interface: 'full+front'
  description: 'emboss brush effect mask with game logo'
  package_name: jdcross-brush-emboss
  artwork:
    file: artwork.xml
    post_process:
      - strategy: background
        overlay: brush_shadow_white.png

jdcross-brush-mk8bg:
  metadata:
    height: full
    type: standalone
    interface: 'full+behind'
  description: 'with Mario Kart 8 themed background'
  package_name: jdcross-brush-mk8bg
  artwork:
    file: artwork.xml
    post_process:
      - strategy: background
        background: [ mk8bg.png ]
        overlay: brush_shadow_black.png