        artwork: 'artbook-next:wheel-black-stroke.xml'
        namespace: artwork
      add_text:
        mapping: rom-translations.yml
        font_variant: bold
        text_bg_opacity: 90
  folder:
    file: 'masked-screenshot-inner-frame.xml'
    post_process:
      offset_with_siblings:
        offset_x: 150
        sibling_count: 3
        loop: true
        effect: greyscale
      background:
        background: bg-black.png
        overlay: overlay-inner-black-50.png
      artwork_generation:
        artwork: 'artbook-next:system-logo.xml'
        namespace: folder
