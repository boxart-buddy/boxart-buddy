artbook-next-full:
  metadata:
    height: full
    type: sibling
  description: "full height, greycale siblings, white system logos w/ black outline"
  package_name: 'artbook-next-full'
  artwork:
    file: 'masked-screenshot.xml'
    post_process:
      offset_with_siblings:
        offset_x: 150
        sibling-count: 3
        loop: true
        effect: greyscale
      artwork_generation:
        artwork: 'artbook-next:wheel-white-stroke.xml'
        namespace: artwork
      add_text:
        mapping: rom_translations.yml
        font_variant: bold
        text_bg_opacity: 90
  folder:
    file: 'masked-screenshot.xml'
    post_process:
      offset_with_siblings:
        offset_x: 150
        sibling_count: 3
        loop: true
        effect: greyscale
      artwork_generation:
        artwork: 'artbook-next:system-logo.xml'
        namespace: folder
        token: '{"logo-type":"dark-white"}'
  portmaster:
    file: 'masked-screenshot.xml'
    post_process:
      artwork_generation:
        artwork: 'artbook-next:wheel-white-stroke.xml'
        namespace: portmaster

artbook-next-inner:
