simple-box-cart:
  metadata:
    height: partial
    type: standalone
    interface: 'full+behind'
  description: "Game box with game cart in front"
  package_name: 'simple-box-cart'
  artwork:
    file: 'simple-box-cart.xml'
simple-box-shadow:
  metadata:
    height: partial
    type: standalone
    interface: 'full+behind'
  description: "Game box with shadow"
  package_name: 'simple-box-shadow'
  artwork:
    file: 'simple-box-shadow.xml'
full-height-with-game-logo:
  metadata:
    height: full
    type: standalone
    interface: 'full+behind'
  description: "Full height with game logo"
  package_name: 'full-height-with-game-logo'
  artwork:
    file: 'full-gradient-screen-wheel.xml'
full-height-with-game-logo-halftone:
  metadata:
    height: full
    type: standalone
    interface: 'full+behind'
  description: "Full height with game logo using 'halftone dots' mask"
  package_name: 'full-height-with-game-logo-halftone'
  artwork:
    file: 'full-gradient-screen-wheel.xml'
    token:
      mask: muos-halftone-dots.png
inner-height-with-game-logo:
  metadata:
    height: inner
    type: standalone
    interface: 'full+behind'
  description: "Inner height with game logo using 'high grain' mask"
  package_name: 'inner-height-with-game-logo'
  artwork:
    file: 'inner-gradient-screen-wheel.xml'
    token:
      mask: muos-grain-high.png
inner-height-with-game-logo-gray:
  metadata:
    height: inner
    type: standalone
    interface: 'full+behind'
  description: "Inner height gradient with game logo and box using 'gray' mask"
  package_name: 'inner-height-with-game-logo-gray'
  artwork:
    file: 'inner-gradient-screen-wheel-box.xml'
    token:
      mask: muos-dithering-gray.png